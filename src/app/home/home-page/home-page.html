<section>
  <div class="card">

    <h1>LPIC Simulator</h1>
    <p>Created by Sir Marcel, Creative Director Prof Dr. Dr. Batuhan.</p>

    <div class="field">
      <label for="catalog">Katalog</label>
      <select id="catalog" [(ngModel)]="catalog" (ngModelChange)="onCatalogChange()">
        <option value="101a">101a</option>
        <option value="101b">101b</option>
        <option value="101c">101c</option>
        <option value="101d">101d</option>
        <option value="101e">101e</option>
        <option value="102a">102a</option>
        <option value="102b">102b</option>
        <option value="102c">102c</option>
        <option value="102d">102d</option>
        <option value="102e">102e</option>
        <option value="102f">102f</option>
        <option value="102g">102g</option>
      </select>
    </div>

    <div class="btn-group-box mode-box">
      <span class="btn-group-label">Modus</span>
      <div class="btn-group">
        <button type="button"
          [class.active]="mode === 'practice'"
          (click)="mode = 'practice'">
          Übungsmodus
        </button>
        <button type="button"
          [class.active]="mode === 'exam'"
          (click)="mode = 'exam'">
          Prüfungsmodus
        </button>
      </div>
    </div>

    <div class="btn-group-box order-box">
      <span class="btn-group-label">Reihenfolge</span>
      <div class="btn-group">
        <button type="button"
          [class.active]="order === 'normal'"
          (click)="order = 'normal'">
          Normal
        </button>
        <button type="button"
          [class.active]="order === 'random'"
          (click)="order = 'random'">
          Zufällig
        </button>
      </div>
    </div>

    <div class="field">
      <label for="questionType">Fragentyp</label>
      <select id="questionType" [(ngModel)]="questionType">
        <option value="all">Alle</option>
        <option value="sc">Single Choice</option>
        <option value="mc">Multiple Choice</option>
        <option value="fi">Freitext</option>
      </select>
    </div>

    <div class="range-row">
      <span class="range-title">Anzahl Fragen (1 – {{ maxQuestions() }})</span>
      <div class="range-inputs">
        <label for="fromQuestion">von</label>
        <input id="fromQuestion" type="number" min="1" [max]="maxQuestions()" [(ngModel)]="fromQuestion">
        <label for="toQuestion">bis</label>
        <input id="toQuestion" type="number" [min]="fromQuestion" [max]="maxQuestions()" [(ngModel)]="toQuestion">
      </div>
    </div>

    @if (mode === 'exam') {
      <div class="field">
        <label for="timePerQuestionSeconds">Zeit pro Frage (Sek.)</label>
        <input id="timePerQuestionSeconds" type="number" min="10" step="10" [(ngModel)]="timePerQuestionSeconds">
      </div>
    }

    <button class="start-btn" (click)="startQuiz()">Start</button>
    <button class="list-btn" routerLink="/list">Fragenliste</button>

  </div>
</section>
