<section>

    <h1>LPIC Simulator</h1>

    <p>Willkommen im LPIC-Simulator.</p>

    <div>

        <label for="catalog">Katalog</label>

        <select id="catalog" [(ngModel)]="catalog">
            <option value="101a">101a</option>
            <option value="101b">101b</option>
            <option value="101c">101c</option>
            <option value="101d">101d</option>
            <option value="101e">101e</option>
            <option value="102a">102a</option>
            <option value="102b">102b</option>
            <option value="102c">102c</option>
            <option value="102d">102d</option>
            <option value="102e">102e</option>
            <option value="102f">102f</option>
            <option value="102g">102g</option>
    </select>

    </div>

    <br>

    <div>

        <label for="mode">Modus</label>

        <select id="mode" [(ngModel)]="mode">

            <option value="practice">Übungsmodus</option>
            <option value="exam">Prüfungsmodus</option>

        </select>

    </div>

    <br>

    <div>

        <label for="order">Reihenfolge</label>

        <select id="order" [(ngModel)]="order">

            <option value="normal">Normal</option>
            <option value="random">Zufällig</option>

        </select>

    </div>

    <br>

    <div>

        <label for="questionType">Fragentyp</label>

        <select id="questionType" [(ngModel)]="questionType">

            <option value="all">Alle</option>
            <option value="sc">Single Choice</option>
            <option value="mc">Multiple Choice</option>
            <option value="fi">Freitext</option>

        </select>

    </div>

    <br>

    <div>

        <label for="numberOfQuestions">Anzahl Fragen</label>

        <input
            id="numberOfQuestions"
            type="number"
            min="1"
            [(ngModel)]="numberOfQuestions">

    </div>

    <br>

    @if (mode === 'exam') {

        <div>

            <label for="timePerQuestionSeconds">Zeit pro Frage (Sek.)</label>

            <input
                id="timePerQuestionSeconds"
                type="number"
                min="10"
                step="10"
                [(ngModel)]="timePerQuestionSeconds">

        </div>

        <br>

    }

    <button (click)="startQuiz()">

        Start

    </button>

    <br>

    <a routerLink="/list">Fragenliste ansehen</a>

</section>
