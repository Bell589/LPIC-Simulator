<section>

  <h1>Auswertung</h1>

  @for (entry of quizService.answeredQuestions(); track entry.questionId) {

    <div class="entry" [class.correct]="entry.isCorrect" [class.incorrect]="!entry.isCorrect">
      <p class="question">Frage: {{ entry.questionText }}</p>
      <p class="answer">Deine Antwort: {{ entry.userAnswerText }}</p>
      @if (!entry.isCorrect) {
        <p class="answer">Richtige Antwort: {{ entry.correctAnswerText }}</p>
      }
    </div>

  } @empty {

    <p>Keine beantworteten Fragen vorhanden.</p>

  }

  <button class="home-btn" (click)="goToHome()">Startseite</button>

</section>
